<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo-network.png">
    <title>NexusCode | Operativo</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --verde-militar: #4B5320;
            --verde-oscuro: #3d431a;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f0; overflow: hidden; height: 100vh; }

        /* --- ANIMACIONES --- */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .fade-out { opacity: 0; transition: opacity 0.8s ease; }
        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- PANTALLAS --- */
        .full-screen-state { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--verde-militar); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; text-align: center; }
        .spinner { font-size: 60px; animation: spin 2s linear infinite; margin-bottom: 20px; }
        .loader-bar { width: 300px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: white; transition: width 3s linear; }

        /* --- LOGIN --- */
        #bloque-login { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--verde-militar); }
        .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 350px; }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        .login-card button { width: 100%; padding: 12px; background: var(--verde-militar); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* --- APP PRINCIPAL --- */
        #contenido-real { display: none; flex-direction: column; height: 100vh; }
        .topbar { background: var(--verde-militar); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .main-wrapper { display: flex; flex: 1; position: relative; }
        
        .sidebar { width: var(--sidebar-width); background: var(--verde-militar); color: white; position: absolute; left: -260px; top: 0; height: 100%; transition: 0.4s; padding: 20px; z-index: 100; }
        .sidebar.active { left: 0; }
        .sidebar li { list-style: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .sidebar li:hover { background: var(--verde-oscuro); }

        .work-area { flex: 1; display: flex; flex-direction: column; transition: 0.4s; }
        .work-area.shifted { margin-left: var(--sidebar-width); }
        .tabs-bar { background: var(--verde-militar); display: flex; align-items: flex-end; padding: 5px 10px 0 10px; gap: 4px; }
        .tab { background: var(--verde-oscuro); color: white; padding: 8px 15px; border-radius: 8px 8px 0 0; font-size: 11px; cursor: pointer; border: none; min-width: 120px; opacity: 0.7; }
        .tab.active { background: #f0f2f0; color: var(--verde-militar); opacity: 1; font-weight: bold; }
        
        .viewport { flex: 1; padding: 30px; overflow-y: auto; background: #f0f2f0; }

        /* TABLAS ADMIN */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; margin-top: 20px; font-size: 14px; }
        th { background: var(--verde-militar); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .status-admin { background: #e3f2fd; color: #1976d2; }
        .status-user { background: #f5f5f5; color: #616161; }

        /* FOOTER PROTECT */
        .footer-protect { position: fixed; bottom: 10px; left: 15px; font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 1px; z-index: 101; pointer-events: none; }
        #contenido-real .footer-protect { color: #888; }
    </style>
</head>
<body>

    <div id="bloque-login">
        <div class="login-card">
            <h2 style="color: var(--verde-militar);">NexusCode</h2>
            <input type="password" id="input-pass" placeholder="Contraseña">
            <button onclick="iniciarSesion()">ENTRAR</button>
        </div>
        <div class="footer-protect">SECURE SESSION • WINDOWS 11 ENVIRONMENT</div>
    </div>

    <div id="pantalla-carga" class="full-screen-state">
        <div class="spinner"><i class="ri-loader-4-line"></i></div>
        <div class="loader-bar"><div class="progress" id="barra-progreso"></div></div>
    </div>

    <div id="pantalla-bienvenida" class="full-screen-state">
        <h1 id="user-display">USUARIO_01</h1>
        <h2 id="role-display" style="font-weight: 300; opacity: 0.7;">RANGO: OPERADOR</h2>
    </div>

    <div id="contenido-real">
        <header class="topbar">
            <div style="display:flex; align-items:center; gap:15px;">
                <i class="ri-menu-line" onclick="toggleSidebar()" style="cursor:pointer"></i>
                <span style="font-weight:bold; font-size: 12px;">NEXUSCODE OS</span>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer">Cerrar sesión</button>
        </header>

        <div class="main-wrapper">
            <aside class="sidebar" id="sidebar">
                <ul id="menu-list">
                    <li><i class="ri-dashboard-line"></i> Mi Panel</li>
                    <li><i class="ri-file-list-3-line"></i> Mis Archivos</li>
                    </ul>
            </aside>

            <main class="work-area" id="work-area">
                <div class="tabs-bar" id="tabs-bar">
                    <div class="tab active"><span>Dashboard</span></div>
                </div>
                <div class="viewport" id="main-view">
                    <h2>Cargando sistema...</h2>
                </div>
            </main>
        </div>
        <div class="footer-protect">SECURE SESSION • WINDOWS 11 ENVIRONMENT</div>
    </div>

    <script>
        // CONFIGURACIÓN DE ROLES (SIMULADA)
        const USERS_DB = {
            "admin123": { name: "ADMIN_ROOT", role: "ADMIN" },
            "user123": { name: "USER_GUEST", role: "USER" }
        };

        let currentUser = null;

        function iniciarSesion() {
            const pass = document.getElementById("input-pass").value;
            
            if (USERS_DB[pass]) {
                currentUser = USERS_DB[pass];
                document.getElementById("bloque-login").style.display = "none";
                ejecutarAnimaciones();
            } else {
                alert("Acceso Denegado");
            }
        }

        function ejecutarAnimaciones() {
            const carga = document.getElementById("pantalla-carga");
            carga.style.display = "flex";
            setTimeout(() => { document.getElementById("barra-progreso").style.width = "100%"; }, 100);

            setTimeout(() => {
                carga.style.display = "none";
                const bienvenida = document.getElementById("pantalla-bienvenida");
                document.getElementById("user-display").innerText = currentUser.name;
                document.getElementById("role-display").innerText = "RANGO: " + currentUser.role;
                bienvenida.style.display = "flex";

                setTimeout(() => {
                    bienvenida.style.display = "none";
                    cargarApp();
                }, 3000);
            }, 3500);
        }

        function cargarApp() {
            document.getElementById("contenido-real").style.display = "flex";
            const menu = document.getElementById("menu-list");
            const view = document.getElementById("main-view");

            if (currentUser.role === "ADMIN") {
                // Añadir opciones de Admin
                menu.innerHTML += `
                    <li style="color: #ffcc00;" onclick="showAdminPanel()"><i class="ri-shield-user-line"></i> GESTIÓN DE ROLES</li>
                    <li style="color: #ffcc00;"><i class="ri-history-line"></i> REGISTRO DE LOGS</li>
                `;
                view.innerHTML = `<h1>Bienvenido, Administrador</h1><p>Tienes acceso total al sistema.</p>`;
            } else {
                view.innerHTML = `<h1>Bienvenido, Usuario</h1><p>Tu acceso es limitado al área operativa.</p>`;
            }
        }

        function showAdminPanel() {
            document.getElementById("main-view").innerHTML = `
                <h2>Panel de Administración de Usuarios</h2>
                <table>
                    <thead>
                        <tr><th>Usuario</th><th>Rol Actual</th><th>Acción</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>USER_GUEST</td><td><span class="status-badge status-user">USER</span></td><td><button>Ascender</button></td></tr>
                        <tr><td>ADMIN_ROOT</td><td><span class="status-badge status-admin">ADMIN</span></td><td>-</td></tr>
                    </tbody>
                </table>
            `;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('work-area').classList.toggle('shifted');
        }
    </script>
</body>
</html>
