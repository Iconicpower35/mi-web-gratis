<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo-network.png">
    <title>NexusCode | Sistema Operativo</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --verde-militar: #4B5320;
            --verde-oscuro: #3d431a;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f0; overflow: hidden; height: 100vh; }

        /* --- ANIMACIONES --- */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .fade-out { opacity: 0; transition: opacity 0.8s ease; }
        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- PANTALLAS --- */
        .full-screen-state {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--verde-militar); color: white;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; text-align: center;
        }

        .spinner { font-size: 60px; animation: spin 2s linear infinite; margin-bottom: 20px; }

        .loader-bar { width: 300px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: white; transition: width 3s cubic-bezier(0.4, 0, 0.2, 1); }

        .user-icon-circle { width: 150px; height: 150px; border: 4px solid white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 80px; margin-bottom: 20px; }

        /* --- LOGIN --- */
        #bloque-login { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--verde-militar); }
        .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 350px; }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        .login-card button { width: 100%; padding: 12px; background: var(--verde-militar); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* --- APP PRINCIPAL --- */
        #contenido-real { display: none; flex-direction: column; height: 100vh; }
        .topbar { background: var(--verde-militar); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .main-wrapper { display: flex; flex: 1; position: relative; }
        .sidebar { width: var(--sidebar-width); background: var(--verde-militar); color: white; position: absolute; left: -260px; top: 0; height: 100%; transition: 0.3s; padding: 20px; z-index: 100; }
        .sidebar.active { left: 0; }
        .work-area { flex: 1; display: flex; flex-direction: column; transition: 0.3s; }
        .work-area.shifted { margin-left: var(--sidebar-width); }
        .tabs-bar { background: var(--verde-militar); display: flex; align-items: flex-end; padding: 5px 10px 0 10px; gap: 4px; }
        .tab { background: var(--verde-oscuro); color: white; padding: 8px 15px; border-radius: 8px 8px 0 0; font-size: 11px; display: flex; align-items: center; gap: 10px; min-width: 130px; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .tab.active { background: white; color: var(--verde-militar); opacity: 1; }
        .viewport { flex: 1; background: white; margin: 15px; border-radius: 12px; padding: 40px; text-align: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="bloque-login">
        <div class="login-card">
            <img src="logo-network.png" style="width: 50px; margin-bottom: 10px;">
            <h2 style="color: var(--verde-militar);">NexusCode</h2>
            <input type="password" id="input-pass" placeholder="Contraseña">
            <button onclick="iniciarCarga()">ENTRAR</button>
        </div>
    </div>

    <div id="pantalla-carga" class="full-screen-state">
        <div class="spinner"><i class="ri-loader-4-line"></i></div>
        <h2 style="letter-spacing: 3px; font-weight: 300;">CARGANDO CONTENIDO</h2>
        <div class="loader-bar"><div class="progress" id="barra-progreso"></div></div>
    </div>

    <div id="pantalla-bienvenida" class="full-screen-state">
        <div class="user-icon-circle fade-in"><i class="ri-user-line"></i></div>
        <h1 class="fade-in">USUARIO_01</h1>
        <div class="fade-in" style="margin-top: 20px; display: flex; align-items: center; gap: 10px;">
            <i class="ri-lock-unlock-line"></i>
            <h2 style="font-weight: 300;">BIENVENIDO DE NUEVO</h2>
        </div>
    </div>

    <div id="contenido-real">
        <header class="topbar">
            <div style="display:flex; align-items:center; gap:15px;">
                <i class="ri-menu-line" style="cursor:pointer;" onclick="toggleSidebar()"></i>
                <span style="font-weight:bold; font-size: 14px;">NEXUSCODE OPERATIVE SYSTEM</span>
            </div>
            <i class="ri-logout-box-r-line" style="cursor:pointer" onclick="location.reload()"></i>
        </header>
        <div class="main-wrapper">
            <aside class="sidebar" id="sidebar">
                <p style="font-size:10px; opacity:0.5; margin-bottom:15px; letter-spacing: 1px;">SISTEMA</p>
                <ul style="list-style: none;">
                    <li style="padding: 10px; cursor: pointer;"><i class="ri-dashboard-line"></i> Dashboard</li>
                    <li style="padding: 10px; cursor: pointer;"><i class="ri-shield-user-line"></i> Seguridad</li>
                </ul>
            </aside>
            <main class="work-area" id="work-area">
                <div class="tabs-bar" id="tabs-bar">
                    <div class="tab active" onclick="selectTab(this)">
                        <span>Pestaña Principal</span>
                        <i class="ri-close-line" onclick="closeTab(event, this)"></i>
                    </div>
                    <button style="background:none; border:none; color:white; cursor:pointer; padding: 5px 10px;" onclick="addTab()">+</button>
                </div>
                <div class="viewport">
                    <h2 style="color:var(--verde-militar)">Panel Central</h2>
                    <p style="color:#888; margin-top:15px;">Todos los sistemas operativos. Bienvenido a NexusCode.</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        function iniciarCarga() {
            if (document.getElementById("input-pass").value === "github_546312!") {
                document.getElementById("bloque-login").style.display = "none";
                const carga = document.getElementById("pantalla-carga");
                carga.style.display = "flex";
                
                setTimeout(() => { document.getElementById("barra-progreso").style.width = "100%"; }, 100);

                // Transición a Bienvenida
                setTimeout(() => {
                    carga.classList.add('fade-out');
                    setTimeout(() => {
                        carga.style.display = "none";
                        const bienvenido = document.getElementById("pantalla-bienvenida");
                        bienvenido.style.display = "flex";
                        
                        // Transición a App (Dura más tiempo como pediste)
                        setTimeout(() => {
                            bienvenido.classList.add('fade-out');
                            setTimeout(() => {
                                bienvenido.style.display = "none";
                                document.getElementById("contenido-real").style.display = "flex";
                            }, 800);
                        }, 4000); // 4 segundos de bienvenida
                    }, 800);
                }, 3500); // Tiempo de carga
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('work-area').classList.toggle('shifted');
        }

        function addTab() {
            const tabsBar = document.getElementById('tabs-bar');
            const btn = tabsBar.querySelector('button');
            const newTab = document.createElement('div');
            newTab.className = 'tab';
            newTab.onclick = function() { selectTab(this); };
            newTab.innerHTML = `<span>Nueva Pág</span><i class="ri-close-line" onclick="closeTab(event, this)"></i>`;
            tabsBar.insertBefore(newTab, btn);
            selectTab(newTab);
        }

        function selectTab(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function closeTab(event, el) {
            event.stopPropagation();
            if (document.querySelectorAll('.tab').length > 1) el.parentElement.remove();
        }
    </script>
</body>
</html>
