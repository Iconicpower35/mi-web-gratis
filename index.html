<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="5wxZgmU_ftInkHbLUNR3AoeY4jrMDVKzdlXwmG6xxHM" />
    <link rel="icon" type="image/png" href="logo-network.png">
    
    <title>NexusCode | Panel de Control</title>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; color: #333; text-align: center; padding: 50px; margin: 0; }
        .contenedor { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 550px; margin: auto; }
        
        h1 { color: #0078d4; margin-bottom: 10px; }
        p { line-height: 1.6; color: #666; }
        .badge { background: #dff6dd; color: #107c10; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 0.8em; }

        /* Estilos del Login */
        input { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 80%; margin: 15px 0; outline: none; }
        input:focus { border-color: #0078d4; box-shadow: 0 0 5px rgba(0,120,212,0.3); }
        .btn-principal { background: #0078d4; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-principal:hover { background: #005a9e; }
        #error-msg { color: #d83b01; font-size: 0.9em; display: none; margin-top: 10px; }

        /* --- ESTILOS DEL DASHBOARD --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #0078d4;
            box-shadow: 0 8px 15px rgba(0,120,212,0.1);
            background: #f9f9f9;
        }

        .card-icon { font-size: 28px; margin-bottom: 10px; }
        .card-text { font-size: 0.85em; font-weight: 600; color: #0078d4; }

        /* Ocultar contenido por defecto */
        #contenido-real { display: none; }
    </style>
</head>
<body>

    <div id="bloque-login" class="contenedor">
        <img src="logo-network.png" alt="NexusCode Logo" style="width: 70px; height: auto; margin-bottom: 15px;">
        <h1>Nexus<span style="font-weight: 300;">Code</span></h1>
        <p>Introduce la clave de acceso seguro:</p>
        <input type="password" id="input-pass" placeholder="Contraseña">
        <br>
        <button class="btn-principal" onclick="comprobar()">Desbloquear</button>
        <p id="error-msg">❌ Contraseña incorrecta</p>
    </div>

    <div id="contenido-real" class="contenedor">
        <img src="logo-network.png" alt="NexusCode Logo" style="width: 50px; height: auto; margin-bottom: 10px;">
        <br>
        <span class="badge">NexusCode Dashboard</span>
        <h1>Bienvenido</h1>
        <p>Panel de control centralizado para tus herramientas de desarrollo.</p>
        
        <div class="dashboard-grid">
            <a href="https://github.com" target="_blank" class="card">
                <span class="card-icon">📂</span>
                <span class="card-text">GitHub</span>
            </a>

            <a href="https://chatgpt.com" target="_blank" class="card">
                <span class="card-icon">🤖</span>
                <span class="card-text">AI Assistant</span>
            </a>

            <a href="https://outlook.live.com" target="_blank" class="card">
                <span class="card-icon">📧</span>
                <span class="card-text">Outlook</span>
            </a>

            <a href="https://youtube.com" target="_blank" class="card">
                <span class="card-icon">📺</span>
                <span class="card-text">YouTube</span>
            </a>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">
        
        <div style="opacity: 0.8;">
            <p style="font-size: 11px; color: #888; letter-spacing: 0.5px; margin: 0;">
                SECURE SESSION • WINDOWS 11 ENVIRONMENT
            </p>
        </div>
        <br>
        <button onclick="location.reload()" style="background: none; color: #999; border: 1px solid #ddd; font-size: 11px; padding: 5px 12px; border-radius: 5px; cursor: pointer;">Cerrar Sesión</button>
    </div>

    <script>
        function comprobar() {
            var claveSecreta = "github_546312!"; 
            var ingresada = document.getElementById("input-pass").value;
            
            if (ingresada === claveSecreta) {
                document.getElementById("bloque-login").style.display = "none";
                document.getElementById("contenido-real").style.display = "block";
            } else {
                document.getElementById("error-msg").style.display = "block";
                document.getElementById("input-pass").value = "";
            }
        }

        document.getElementById("input-pass").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                comprobar();
            }
        });
    </script>

</body>
</html>
