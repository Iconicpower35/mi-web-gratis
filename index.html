<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo-network.png">
    <title>NexusCode | Operativo</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --verde-militar: #4B5320;
            --verde-oscuro: #3d431a;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f0; overflow: hidden; height: 100vh; }

        /* --- PANTALLAS DE ESTADO --- */
        .full-screen-state { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--verde-militar); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; text-align: center; }
        .spinner { font-size: 60px; animation: spin 2s linear infinite; margin-bottom: 20px; }
        .loader-bar { width: 300px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: white; transition: width 3s linear; }

        /* --- LOGIN --- */
        #bloque-login { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--verde-militar); flex-direction: column;}
        .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 350px; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        .login-card button { width: 100%; padding: 12px; background: var(--verde-militar); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px;}
        .request-access { margin-top: 15px; font-size: 13px; color: #888; cursor: pointer; border: none; background: none; }

        /* --- APP PRINCIPAL --- */
        #contenido-real { display: none; flex-direction: column; height: 100vh; }
        .topbar { background: var(--verde-militar); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; }
        .main-wrapper { display: flex; flex: 1; position: relative; }
        
        .sidebar { 
            width: var(--sidebar-width); background: var(--verde-militar); color: white; 
            position: absolute; left: -260px; top: 0; height: 100%; transition: 0.4s; 
            padding: 20px; z-index: 100; overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar li { list-style: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; transition: 0.3s; font-size: 14px; }
        .sidebar li:hover { background: var(--verde-oscuro); }

        .work-area { flex: 1; display: flex; flex-direction: column; transition: 0.4s; }
        .work-area.shifted { margin-left: var(--sidebar-width); }
        .viewport { flex: 1; padding: 30px; overflow-y: auto; background: #f0f2f0; }

        /* TABLAS Y ELEMENTOS VISUALES */
        .user-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);}
        .user-table th { background: var(--verde-militar); color: white; padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; }
        .user-table td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .log-entry { font-family: monospace; font-size: 12px; padding: 8px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
        .log-user { color: var(--verde-militar); font-weight: bold; }

        .personal-notes { width: 100%; height: 350px; padding: 20px; border-radius: 12px; border: 1px solid #ddd; font-family: 'Segoe UI', sans-serif; resize: none; outline: none; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- PANTALLA LOGIN -->
    <div id="bloque-login">
        <div class="login-card">
            <h2 style="color: var(--verde-militar); margin-bottom: 20px;">NexusCode OS</h2>
            <input type="text" id="login-nombre" placeholder="Nombre Operativo">
            <input type="text" id="login-rango" placeholder="Rango (Ej: Sniper)">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button onclick="iniciarSesion()">AUTENTICAR</button>
            <button class="request-access" onclick="enviarSolicitud()">Solicitar Acceso</button>
        </div>
    </div>

    <!-- PANTALLA CARGA -->
    <div id="pantalla-carga" class="full-screen-state">
        <div class="spinner"><i class="ri-loader-4-line"></i></div>
        <div class="loader-bar"><div class="progress" id="barra-progreso"></div></div>
        <p style="margin-top:15px; font-size:10px; letter-spacing:2px;">CARGANDO NÚCLEO SEGURO</p>
    </div>

    <!-- PANTALLA BIENVENIDA -->
    <div id="pantalla-bienvenida" class="full-screen-state">
        <div style="font-size: 80px; margin-bottom: 20px;"><i class="ri-account-circle-line"></i></div>
        <h1 id="user-display">USUARIO</h1>
        <h2 id="role-display" style="font-weight: 300; opacity: 0.7;">RANGO: -</h2>
    </div>

    <!-- INTERFAZ PRINCIPAL -->
    <div id="contenido-real">
        <header class="topbar">
            <div style="display:flex; align-items:center; gap:15px;">
                <i class="ri-menu-line" onclick="toggleSidebar()" style="cursor:pointer; font-size: 20px;"></i>
                <span id="topbar-user" style="font-weight:bold; font-size: 11px; letter-spacing: 1px;">SISTEMA ACTIVO</span>
            </div>
            <button onclick="location.reload()" style="background:rgba(255,255,255,0.1); border:none; color:white; padding:5px 15px; border-radius:4px; cursor:pointer; font-size:10px;">CERRAR SESIÓN</button>
        </header>

        <div class="main-wrapper">
            <aside class="sidebar" id="sidebar">
                <p style="font-size:10px; opacity:0.5; margin-bottom:15px; font-weight: bold;">MI TERMINAL</p>
                <ul>
                    <li onclick="showDashboard()"><i class="ri-dashboard-line"></i> Dashboard</li>
                    <li onclick="showPersonalSpace()"><i class="ri-sticky-note-line"></i> Mis Notas</li>
                </ul>

                <div id="admin-menu" style="display:none; margin-top: 25px;">
                    <p style="font-size:10px; opacity:0.5; margin-bottom:15px; font-weight: bold;">ADMINISTRACIÓN</p>
                    <ul>
                        <li onclick="showRequestPanel()" style="color: #ffcc00;"><i class="ri-user-add-line"></i> Solicitudes</li>
                        <li onclick="showUserPanel()"><i class="ri-team-line"></i> Personal</li>
                        <li onclick="showLogs()"><i class="ri-terminal-window-line"></i> Logs de Sistema</li>
                    </ul>
                </div>

                <!-- REPRODUCTOR APPLE MUSIC INTEGRADO -->
                <div style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                    <p style="font-size:10px; opacity:0.5; margin-bottom:12px; font-weight: bold;">SISTEMA DE AUDIO</p>
                    <iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" 
                            frameborder="0" height="175" 
                            style="width:100%; max-width:660px; overflow:hidden; border-radius:10px;" 
                            sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" 
                            src="https://embed.music.apple.com/es/song/bad/559334751">
                    </iframe>
                </div>
            </aside>

            <main class="work-area" id="work-area">
                <div class="viewport" id="main-view"></div>
            </main>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS ---
        let USERS = JSON.parse(localStorage.getItem('nexus_users')) || [
            { name: "ADMIN_COMMAND", range: "Overseer", role: "ADMIN", pass: "admin_nexus" }
        ];
        let REQUESTS = JSON.parse(localStorage.getItem('nexus_requests')) || [];
        let LOGS = JSON.parse(localStorage.getItem('nexus_logs')) || [];
        let PERSONAL_DATA = JSON.parse(localStorage.getItem('nexus_personal')) || {};

        let currentUser = null;

        function saveDB() {
            localStorage.setItem('nexus_users', JSON.stringify(USERS));
            localStorage.setItem('nexus_requests', JSON.stringify(REQUESTS));
            localStorage.setItem('nexus_logs', JSON.stringify(LOGS));
            localStorage.setItem('nexus_personal', JSON.stringify(PERSONAL_DATA));
        }

        function addLog(action) {
            const timeStr = new Date().toLocaleString();
            LOGS.unshift({ user: currentUser ? currentUser.name : "Invitado", action: action, date: timeStr });
            saveDB();
        }

        // --- LÓGICA DE ACCESO ---
        function iniciarSesion() {
            const nombre = document.getElementById("login-nombre").value;
            const pass = document.getElementById("login-pass").value;
            const match = USERS.find(u => u.name === nombre && u.pass === pass);

            if (match) {
                currentUser = match;
                addLog("Login detectado");
                document.getElementById("bloque-login").style.display = "none";
                animarEntrada();
            } else {
                alert("Acceso denegado. Verifique nombre y contraseña.");
            }
        }

        function enviarSolicitud() {
            const nombre = document.getElementById("login-nombre").value;
            const rango = document.getElementById("login-rango").value;
            const pass = document.getElementById("login-pass").value;
            if(!nombre || !pass) return alert("Complete los campos.");

            REQUESTS.push({ name: nombre, range: rango || "Recruit", pass: pass });
            const time = new Date().toLocaleString();
            LOGS.unshift({ user: nombre, action: "Nueva solicitud de acceso", date: time });
            saveDB();
            alert("Solicitud enviada al Administrador.");
        }

        function animarEntrada() {
            document.getElementById("pantalla-carga").style.display = "flex";
            setTimeout(() => { document.getElementById("barra-progreso").style.width = "100%"; }, 100);
            setTimeout(() => {
                document.getElementById("pantalla-carga").style.display = "none";
                document.getElementById("user-display").innerText = currentUser.name;
                document.getElementById("role-display").innerText = `RANGO: ${currentUser.range}`;
                document.getElementById("pantalla-bienvenida").style.display = "flex";
                setTimeout(() => {
                    document.getElementById("pantalla-bienvenida").style.display = "none";
                    document.getElementById("contenido-real").style.display = "flex";
                    document.getElementById("topbar-user").innerText = `NODO ACTIVO: ${currentUser.name}`;
                    if(currentUser.role === 'ADMIN') document.getElementById("admin-menu").style.display = "block";
                    showDashboard();
                }, 2500);
            }, 3500);
        }

        // --- VISTAS DINÁMICAS ---
        function showDashboard() {
            document.getElementById("main-view").innerHTML = `
                <h1 style="color:var(--verde-militar)">Centro de Control Nexus</h1>
                <p>Bienvenido, ${currentUser.name}. El sistema se encuentra estable.</p>
                <div style="margin-top:20px; padding:20px; background:white; border-radius:12px; border-left: 5px solid var(--verde-militar);">
                    <h4 style="font-size:12px; opacity:0.6;">ÚLTIMO LOG:</h4>
                    <p style="font-size:14px; font-family:monospace; margin-top:5px;">${LOGS[0] ? LOGS[0].action + " [" + LOGS[0].date + "]" : "Sin actividad registrada"}</p>
                </div>
            `;
        }

        function showPersonalSpace() {
            const userNotes = PERSONAL_DATA[currentUser.name] || "";
            document.getElementById("main-view").innerHTML = `
                <h2><i class="ri-sticky-note-line"></i> Terminal de Notas de ${currentUser.name}</h2>
                <p style="font-size:12px; color:#888; margin-bottom:15px;">Datos encriptados localmente.</p>
                <textarea class="personal-notes" id="note-area" placeholder="Escriba aquí...">${userNotes}</textarea>
                <button onclick="saveNotes()" style="margin-top:15px; padding:12px 25px; background:var(--verde-militar); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">GUARDAR EN MEMORIA</button>
            `;
        }

        function saveNotes() {
            PERSONAL_DATA[currentUser.name] = document.getElementById("note-area").value;
            saveDB();
            addLog("Actualizó notas personales");
            alert("Notas guardadas correctamente.");
        }

        function showLogs() {
            let logHtml = LOGS.map(l => `
                <div class="log-entry">
                    <span><span class="log-user">[${l.user}]</span> ${l.action}</span>
                    <span style="color:#999;">${l.date}</span>
                </div>
            `).join('');
            document.getElementById("main-view").innerHTML = `
                <h2><i class="ri-terminal-window-line"></i> Auditoría de Sistema</h2>
                <div style="background:white; border-radius:12px; margin-top:20px; padding:10px; max-height:500px; overflow-y:auto;">${logHtml || "Vacío."}</div>
            `;
        }

        function showRequestPanel() {
            let rows = REQUESTS.map((req, i) => `
                <tr>
                    <td><b>${req.name}</b></td><td>${req.range}</td>
                    <td><button style="padding:6px 12px; background:#4caf50; color:white; border:none; border-radius:4px; cursor:pointer;" onclick="acceptReq(${i})">ACEPTAR</button></td>
                </tr>`).join('');
            document.getElementById("main-view").innerHTML = `
                <h2>Solicitudes de Ingreso</h2>
                <table class="user-table">
                    <thead><tr><th>Nombre</th><th>Rango</th><th>Acción</th></tr></thead>
                    <tbody>${rows || '<tr><td colspan="3" style="text-align:center; padding:20px;">No hay solicitudes</td></tr>'}</tbody>
                </table>`;
        }

        function acceptReq(i) {
            const req = REQUESTS[i];
            USERS.push({ ...req, role: 'USER' });
            addLog(`Admin aceptó a ${req.name}`);
            REQUESTS.splice(i, 1);
            saveDB();
            showRequestPanel();
        }

        function showUserPanel() {
            let rows = USERS.map(u => `<tr><td>${u.name}</td><td>${u.range}</td><td>${u.role}</td></tr>`).join('');
            document.getElementById("main-view").innerHTML = `
                <h2>Personal Autorizado</h2>
                <table class="user-table">
                    <thead><tr><th>Nombre</th><th>Rango</th><th>Rol</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>`;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('work-area').classList.toggle('shifted');
        }
    </script>
</body>
</html>
